<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1080 500" width="100%" height="100%">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
            <feOffset dx="2" dy="3" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.1" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <marker id="arrow-solid" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2b2d42"/>
        </marker>
        
        <marker id="arrow-inheritance" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" orient="auto">
            <path d="M 0 0 L 12 6 L 0 12 Z" fill="#ffffff" stroke="#2b2d42" stroke-width="1.5"/>
        </marker>
    </defs>

    <rect width="100%" height="100%" fill="#f8f9fa" />

    <line x1="410" y1="120" x2="680" y2="120" stroke="#2b2d42" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-solid)"/>
    <text x="525" y="110" font-family="sans-serif" font-size="12" font-style="italic" fill="#2b2d42">calls</text>

    <polyline points="215,280 215,295 423,295" fill="none" stroke="#2b2d42" stroke-width="2" marker-end="url(#arrow-solid)"/>
    <text x="300" y="285" font-family="sans-serif" font-size="12" font-style="italic" fill="#2b2d42">uses</text>

    <polyline points="865,160 865,295 643,295" fill="none" stroke="#2b2d42" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-solid)"/>
    <text x="730" y="285" font-family="sans-serif" font-size="12" font-style="italic" fill="#2b2d42">creates</text>

    <line x1="533" y1="390" x2="533" y2="340" stroke="#2b2d42" stroke-width="2" marker-end="url(#arrow-inheritance)"/>
    <line x1="83" y1="390" x2="983" y2="390" stroke="#2b2d42" stroke-width="2"/>
    <line x1="83" y1="390" x2="83" y2="430" stroke="#2b2d42" stroke-width="2"/>
    <line x1="233" y1="390" x2="233" y2="430" stroke="#2b2d42" stroke-width="2"/>
    <line x1="383" y1="390" x2="383" y2="430" stroke="#2b2d42" stroke-width="2"/>
    <line x1="533" y1="390" x2="533" y2="430" stroke="#2b2d42" stroke-width="2"/>
    <line x1="683" y1="390" x2="683" y2="430" stroke="#2b2d42" stroke-width="2"/>
    <line x1="833" y1="390" x2="833" y2="430" stroke="#2b2d42" stroke-width="2"/>
    <line x1="983" y1="390" x2="983" y2="430" stroke="#2b2d42" stroke-width="2"/>

    <rect x="20" y="20" width="390" height="260" rx="6" ry="6" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="215" y="42" font-weight="bold" font-family="sans-serif" fill="#2b2d42" text-anchor="middle">Builder</text>
    <line x1="20" y1="52" x2="410" y2="52" stroke="#2b2d42"/>
    <text x="30" y="70" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">- strategy: Strategy</text>
    <line x1="20" y1="80" x2="410" y2="80" stroke="#2b2d42"/>
    <text x="30" y="100" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">+ main(args: String[]): void</text>
    <text x="30" y="120" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">~ buildSite(): void</text>
    <text x="30" y="140" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">~ parseContentFiles(folder: String): String[][]</text>
    <text x="30" y="160" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">+ readFile(path: String): String</text>
    <text x="30" y="180" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">+ writeFile(path: String, content: String): void</text>
    <text x="30" y="200" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">~ makeFile(file: String[], config: String): StringBuilder</text>
    <text x="30" y="220" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">+ stringEditor(contentName, newContent, file): void</text>
    <text x="30" y="240" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">- setStrategy(option: String): void</text>
    <text x="30" y="260" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">- performStrategy(file, config): void</text>

    <rect x="680" y="80" width="370" height="80" rx="6" ry="6" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="865" y="102" font-weight="bold" font-family="sans-serif" fill="#2b2d42" text-anchor="middle">Factory</text>
    <line x1="680" y1="112" x2="1050" y2="112" stroke="#2b2d42"/>
    <text x="695" y="132" font-family="monospace" font-size="12" fill="#2b2d42" text-decoration="underline">~ decideStrategy(option: String): Strategy</text>

    <rect x="423" y="250" width="220" height="90" rx="6" ry="6" fill="#f1f3f5" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="533" y="265" font-style="italic" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2b2d42" text-anchor="middle">&lt;&lt;abstract&gt;&gt;</text>
    <text x="533" y="280" font-weight="bold" font-family="sans-serif" fill="#2b2d42" text-anchor="middle">Strategy</text>
    <line x1="423" y1="290" x2="643" y2="290" stroke="#2b2d42"/>
    <text x="433" y="307" font-family="monospace" font-size="12" fill="#2b2d42">~ option: String</text>
    <line x1="423" y1="315" x2="643" y2="315" stroke="#2b2d42"/>
    <text x="433" y="332" font-family="monospace" font-style="italic" font-size="12" fill="#2b2d42">~ makeChanges(file, config)</text>

    <rect x="15" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="83" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">NavbarStrategy</text>

    <rect x="165" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="233" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">SocialLinksStrategy</text>

    <rect x="315" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="383" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">SocialIconsStrategy</text>

    <rect x="465" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="533" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">ThemeNameStrategy</text>

    <rect x="615" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="683" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">NonArrayStrategy</text>

    <rect x="765" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="833" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">PostTagsStrategy</text>

    <rect x="915" y="430" width="136" height="40" rx="4" ry="4" fill="#ffffff" stroke="#2b2d42" stroke-width="2" filter="url(#shadow)"/>
    <text x="983" y="455" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2b2d42" text-anchor="middle">PostContentStrategy</text>
</svg>
