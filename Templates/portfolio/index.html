<style>
    .hero-section { margin-bottom: 80px; display: flex; flex-direction: column; align-items: flex-start; }
    .hero-title { font-size: 3.5em; font-weight: 800; margin: 0 0 20px; line-height: 1.1; letter-spacing: -1px; }
    .hero-intro { font-size: 1.25em; max-width: 600px; margin: 0 0 30px; font-weight: 300; }
    
    .social-icons a { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; font-size: 1.2em; transition: all 0.3s ease; background-color: var(--theme-alt-bg); border: 1px solid var(--theme-border); }
    .social-icons a:hover { transform: translateY(-3px); }
    
    .section-title { font-size: 1.5em; margin-bottom: 30px; border-bottom: 1px solid var(--theme-border); padding-bottom: 15px; font-weight: 600; }
    
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
    
    .tag-cloud { margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--theme-border); }
    .tag-cloud a { display: inline-block; padding: 6px 16px; background: transparent; border: 1px solid var(--theme-border); border-radius: 30px; margin: 0 10px 10px 0; font-size: 0.85em; transition: all 0.3s; }
</style>

<div class="hero-section">
    <h1 class="hero-title">{{ WELCOME_TITLE }}</h1>
    <p class="hero-intro">{{ INTRO_ABOUT_ME }}</p>
    <div class="social-icons">
        {{ SOCIAL_ICONS }}
    </div>
</div>

<h2 class="section-title">Selected Works</h2>
<div class="portfolio-grid">
    {{ POST_LIST }}
</div>

<div class="tag-cloud">
    <h3 style="font-size: 1em; margin-bottom:15px;">Filter by Technologies</h3>
    {{ TAG_CLOUD }}
</div>
