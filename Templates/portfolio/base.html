<!DOCTYPE html>
<html lang="{{ SITE_LANGUAGE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ SITE_DESCRIPTION }}">
{{ SEO_META }}
    <title>{{ SITE_TITLE }}</title>
    <link rel="icon" type="image/x-icon" href="{{ FAVICON_URL }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; line-height: 1.7; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
        a { text-decoration: none; transition: color 0.3s; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; border-bottom: 1px solid var(--theme-border); margin-bottom: 50px; }
        .site-title { font-size: 1.5em; font-weight: 700; text-decoration: none; letter-spacing: -0.5px; }
        .nav-bar { display: flex; gap: 24px; font-size: 0.9em; font-weight: 500; }
        .nav-bar a { text-transform: uppercase; letter-spacing: 1px; }

        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--theme-border); font-size: 0.85em; }
        .footer-links a { margin-right: 15px; }
        .footer-copy p { margin: 0 0 5px 0; text-align: right; }

        pre { padding: 20px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--theme-border); }
        code { font-family: 'Fira Code', monospace; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        blockquote { border-left: 4px solid var(--theme-border); margin: 0 0 20px 0; padding-left: 20px; font-style: italic; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; border-bottom: 1px solid var(--theme-border); text-align: left; }
        img { max-width: 100%; height: auto; border-radius: 12px; }
        .post-card-image { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }
        img[src=""], img[src=" "], img[src="  "], img[src="-1"] {display: none;}
    </style>
    <link rel="stylesheet" href="{{ THEME_NAME }}">
</head>

<body>
    <header class="header container">
        <div class="site-branding">
            <a href="./index.html" class="site-title">{{ SITE_TITLE }}</a>
        </div>
        <nav class="nav-bar">
            {{ NAV_BAR_LINKS }}
        </nav>
    </header>

    <main class="content container">
        {{ CONTENT }}
    </main>

    <footer class="footer container">
        <div class="footer-links">
            {{ SOCIAL_LINKS }}
        </div>
        <div class="footer-copy">
            <p>&copy; {{ COPYRIGHT_YEAR }} {{ AUTHOR_NAME }}</p>
            <p>Manufactured by <a href="https://osman.guru">OSMAN</a></p>
        </div>
    </footer>
</body>

</html>
