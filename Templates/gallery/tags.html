<style>
    .tag-hero { text-align: center; margin-bottom: 60px; padding: 40px 0; border-bottom: 1px solid var(--theme-border); }
    .tag-hero h1 { font-size: 2.5em; font-weight: 300; margin: 0; letter-spacing: -0.5px; }
    
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-bottom: 80px; }
    
    .post-card { display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; background-color: var(--theme-alt-bg); border: 1px solid var(--theme-border); transition: transform 0.3s, box-shadow 0.3s; border-radius: 4px; }
    .post-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-color: var(--theme-accent); }
    
    .post-card-title { font-size: 1.2em; font-weight: 600; margin: 0 0 10px 0; }
    .post-card-excerpt { font-size: 0.9em; opacity: 0.7; margin: 0 0 15px 0; }
    .post-card-meta { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
</style>

<div class="tag-hero">
    <h1>Exhibition: {{ TAG_TITLE }}</h1>
</div>

<div class="gallery-grid">
    {{ POST_LIST }}
</div>
