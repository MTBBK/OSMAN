<!DOCTYPE html>
<html lang="{{ SITE_LANGUAGE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ SITE_DESCRIPTION }}">
    {{ SEO_META }}
    <title>{{ SITE_TITLE }}</title>
    <link rel="icon" type="image/x-icon" href="{{ FAVICON_URL }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        a {
            text-decoration: none;
            transition: color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--theme-border);
            margin-bottom: 40px;
        }

        .site-title {
            font-size: 1.8em;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-bar {
            display: flex;
            gap: 30px;
            font-size: 0.9em;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid var(--theme-border);
            font-size: 0.85em;
            opacity: 0.8;
        }

        .footer-links a {
            margin-right: 20px;
        }

        .footer-copy p {
            margin: 0;
        }

        pre {
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--theme-border);
        }

        code {
            padding: 3px 6px;
            border-radius: 4px;
        }

        blockquote {
            border-left: 3px solid var(--theme-accent);
            margin: 0 0 20px 0;
            padding-left: 20px;
            font-style: italic;
            font-size: 1.1em;
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid var(--theme-border);
            text-align: left;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .post-card-image { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }
        img[src=""], img[src=" "], img[src="  "], img[src="-1"] {display: none;}
    </style>
    <link rel="stylesheet" href="{{ THEME_NAME }}">
</head>

<body>
    <header class="header container">
        <div class="site-branding">
            <a href="./index.html" class="site-title">{{ SITE_TITLE }}</a>
        </div>
        <nav class="nav-bar">
            {{ NAV_BAR_LINKS }}
        </nav>
    </header>

    <main class="content container">
        {{ CONTENT }}
    </main>

    <footer class="footer container">
        <div class="footer-links">
            {{ SOCIAL_LINKS }}
        </div>
        <div class="footer-copy">
            <p>&copy; {{ COPYRIGHT_YEAR }} {{ AUTHOR_NAME }}</p>
            <p>Manufactured by <a href="https://osman.guru">OSMAN</a></p>
        </div>
    </footer>
</body>

</html>
