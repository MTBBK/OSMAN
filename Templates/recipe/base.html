<!DOCTYPE html>
<html lang="{{ SITE_LANGUAGE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ SITE_DESCRIPTION }}">
{{ SEO_META }}
    <title>{{ SITE_TITLE }}</title>
    <link rel="icon" type="image/x-icon" href="{{ FAVICON_URL }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { font-family: 'Georgia', serif; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        a { text-decoration: none; transition: color 0.2s; }
        .header { text-align: center; padding: 40px 0 20px; border-bottom: 1px solid var(--theme-border); margin-bottom: 40px; }
        .site-title { font-size: 2.5em; font-family: 'Playfair Display', serif; text-decoration: none; }
        .nav-bar { margin-top: 20px; display: flex; justify-content: center; gap: 20px; font-family: sans-serif; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        .footer { text-align: center; margin-top: 60px; padding: 40px 0; border-top: 1px solid var(--theme-border); font-family: sans-serif; font-size: 0.9em; }
        .footer-links { margin-bottom: 20px; }
        .footer-links a { margin: 0 10px; }
        pre { padding: 15px; border-radius: 4px; overflow-x: auto; border: 1px solid var(--theme-border); }
        code { font-family: monospace; padding: 2px 4px; border-radius: 4px; }
        blockquote { border-left: 4px solid var(--theme-border); margin: 0; padding-left: 20px; font-style: italic; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; border-bottom: 1px solid var(--theme-border); text-align: left; }
        img { max-width: 100%; height: auto; border-radius: 8px; }
        .post-card-image { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }
        img[src=""], img[src=" "], img[src="  "], img[src="-1"] {display: none;}
    </style>
    <link rel="stylesheet" href="{{ THEME_NAME }}">
</head>

<body>
    <header class="header container">
        <div class="site-branding">
            <a href="./index.html" class="site-title">{{ SITE_TITLE }}</a>
        </div>
        <nav class="nav-bar">
            {{ NAV_BAR_LINKS }}
        </nav>
    </header>

    <main class="content container">
        {{ CONTENT }}
    </main>

    <footer class="footer container">
        <div class="footer-links">
            {{ SOCIAL_LINKS }}
        </div>
        <div class="footer-copy">
            <p>&copy; {{ COPYRIGHT_YEAR }} {{ AUTHOR_NAME }}</p>
            <p>Manufactured by <a href="https://osman.guru">OSMAN</a></p>
        </div>
    </footer>
</body>

</html>
