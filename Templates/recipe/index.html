<style>
    .welcome-section { text-align: center; margin-bottom: 50px; }
    .author-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 4px solid var(--theme-border); }
    .welcome-title { font-size: 2.5em; font-family: 'Playfair Display', serif; margin: 0 0 10px; }
    .intro-text { font-size: 1.1em; max-width: 600px; margin: 0 auto 20px; }
    .social-icons { margin-bottom: 30px; }
    .social-icons a { font-size: 1.5em; margin: 0 10px; transition: color 0.2s; }
    
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
    
    .tag-cloud { margin-bottom: 30px; text-align: center; }
    .tag-cloud a { display: inline-block; padding: 5px 15px; border: 1px solid var(--theme-border); border-radius: 20px; margin: 5px; font-size: 0.85em; font-family: sans-serif; text-transform: uppercase; background-color: var(--theme-alt-bg); }
</style>

<div class="welcome-section">
    <img src="{{ AUTHOR_AVATAR_URL }}" alt="Author Avatar" class="author-avatar">
    <h1 class="welcome-title">{{ WELCOME_TITLE }}</h1>
    <p class="intro-text">{{ INTRO_ABOUT_ME }}</p>
    <div class="social-icons">
        {{ SOCIAL_ICONS }}
    </div>
</div>

<div class="tag-cloud">
    {{ TAG_CLOUD }}
</div>

<div class="recipe-grid">
    {{ POST_LIST }}
</div>
