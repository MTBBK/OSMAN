<style>
    .recipe-hero {
        margin: -20px -20px 40px -20px;
        overflow: hidden;
        border-radius: 8px 8px 0 0;
    }

    .recipe-hero img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        display: block;
        border-radius: 0;
    }

    .recipe-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .recipe-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 3em;
        margin: 0 0 15px;
        line-height: 1.2;
    }

    .recipe-meta-bar {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        font-family: sans-serif;
        font-size: 0.9em;
        text-transform: uppercase;
        border-top: 1px solid var(--theme-border);
        border-bottom: 1px solid var(--theme-border);
        padding: 10px 0;
    }

    .recipe-body {
        font-size: 1.1em;
    }

    /* Styling specifically useful for recipes */
    .recipe-body ul {
        padding: 30px 30px 30px 50px;
        border-radius: 8px;
        list-style-type: square;
        background-color: var(--theme-alt-bg);
    }

    .recipe-body ul li {
        margin-bottom: 10px;
    }

    .recipe-body ol {
        padding-left: 20px;
    }

    .recipe-body ol li {
        margin-bottom: 20px;
        padding-left: 10px;
    }

    .recipe-categories,
    .recipe-tags {
        margin-top: 40px;
        text-align: center;
    }

    .recipe-categories span {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.8em;
        font-family: sans-serif;
        text-transform: uppercase;
        margin: 0 5px;
        border: 1px solid var(--theme-border);
        background-color: var(--theme-alt-bg);
    }

    .post-pagination {
        display: flex;
        justify-content: space-between;
        margin-top: 50px;
        padding-top: 20px;
        border-top: 1px solid var(--theme-border);
        font-family: sans-serif;
        text-transform: uppercase;
        font-size: 0.9em;
    }

    .author-bio {
        display: flex;
        gap: 1rem;
        align-items: center;
        background: var(--theme-alt-bg, #f9f9f9);
        padding: 1.5rem;
        border-radius: 8px;
        margin: 2rem auto;
        max-width: 600px;
    }

    .author-bio img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
    }

    .author-bio strong {
        display: block;
        font-family: 'Playfair Display', serif;
        font-size: 1.2em;
    }

    .author-bio span {
        font-size: 0.9em;
        font-family: sans-serif;
        opacity: 0.8;
    }
</style>

<article class="recipe-post">
    <div class="recipe-hero">
        <img src="{{ FEATURED_IMAGE }}" alt="Recipe Image">
    </div>

    <header class="recipe-header">
        <h1>{{ POST_TITLE }}</h1>
        <div class="recipe-meta-bar">
            <span><i class="fa fa-calendar"></i> {{ POST_DATE }}</span>
            <span><i class="fa fa-user"></i> {{ POST_AUTHOR }}</span>
            <span><i class="fa fa-clock-o"></i> {{ POST_READ_TIME }}</span>
        </div>
    </header>

    <div class="recipe-body">
        {{ POST_TOC }}
        {{ POST_CONTENT }}
    </div>

    <footer class="recipe-footer">
        <div class="tag-cloud recipe-tags">
            {{ POST_TAGS }}
        </div>

        {{ AUTHOR_CARD }}

        <nav class="post-pagination">
            <div class="prev-post">{{ PREVIOUS_POST }}</div>
            <div class="next-post">{{ NEXT_POST }}</div>
        </nav>
    </footer>
</article>
