<style>
    .docs-hero { padding: 40px 0; margin-bottom: 40px; border-bottom: 1px solid var(--theme-border); }
    .docs-hero h1 { font-size: 2.5em; font-weight: 600; margin: 0 0 16px 0; letter-spacing: -0.5px; }
    .docs-hero p { font-size: 1.25em; margin: 0; max-width: 600px; }
    
    .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
    
    .tag-cloud { padding-top: 20px; border-top: 1px solid var(--theme-border); }
    .tag-cloud h3 { font-size: 1em; margin-bottom: 15px; }
</style>

<div class="docs-hero">
    <h1>{{ WELCOME_TITLE }}</h1>
    <p>{{ INTRO_ABOUT_ME }}</p>
</div>

<h2 style="font-size: 1.5em; margin-bottom: 24px;">Articles</h2>
<div class="docs-grid">
    {{ POST_LIST }}
</div>

<div class="tag-cloud">
    <h3>Browse by Topic</h3>
    {{ TAG_CLOUD }}
</div>
