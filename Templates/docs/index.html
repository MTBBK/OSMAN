<style>
    .docs-hero { padding: 40px 0; margin-bottom: 40px; border-bottom: 1px solid var(--border); }
    .docs-hero h1 { font-size: 2.5em; font-weight: 600; margin: 0 0 16px 0; letter-spacing: -0.5px; }
    .docs-hero p { font-size: 1.25em; color: #586069; margin: 0; max-width: 600px; }
    
    .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
    .docs-card { border: 1px solid var(--border); border-radius: 6px; padding: 24px; transition: border-color 0.2s; background: #fff; }
    .docs-card:hover { border-color: var(--primary); }
    .docs-card h2 { font-size: 1.25em; margin: 0 0 8px 0; }
    .docs-card h2 a { color: var(--text); }
    .docs-card h2 a:hover { color: var(--primary); text-decoration: none; }
    .docs-card p { color: #586069; font-size: 0.9em; margin: 0 0 16px 0; }
    .docs-meta { font-size: 0.8em; color: #6a737d; }
    
    .tag-cloud { padding-top: 20px; border-top: 1px solid var(--border); }
    .tag-cloud h3 { font-size: 1em; color: #24292e; margin-bottom: 15px; }
    .tag-cloud a { display: inline-block; padding: 4px 10px; background-color: #f1f8ff; color: var(--primary); border-radius: 2em; font-size: 12px; font-weight: 500; margin: 0 8px 8px 0; }
    .tag-cloud a:hover { background-color: var(--primary); color: #fff; text-decoration: none; }
</style>

<div class="docs-hero">
    <h1>{{ WELCOME_TITLE }}</h1>
    <p>{{ INTRO_ABOUT_ME }}</p>
</div>

<h2 style="font-size: 1.5em; margin-bottom: 24px;">Articles</h2>
<div class="docs-grid">
    {{ POST_LIST }}
</div>

<div class="tag-cloud">
    <h3>Browse by Topic</h3>
    {{ TAG_CLOUD }}
</div>
