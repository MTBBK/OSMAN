<section class="nl-tags">
    <header class="tags-header" style="text-align: center; margin-bottom: 3rem; padding: 2rem; background: var(--theme-surface-alt, #f9f9f9); border-radius: 8px;">
        <h2 style="font-family: sans-serif; margin-bottom: 1.5rem;">{{ TAG_TITLE }}</h2>
        <div class="tag-cloud" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem;">
            {{ TAG_CLOUD }}
        </div>
    </header>

    <div class="post-feed">
        {{ POST_LIST }}
    </div>
</section>
