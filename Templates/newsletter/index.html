<section class="nl-index">
    <div class="nl-intro" style="text-align: center; margin-bottom: 3rem; padding: 2rem; background: var(--theme-surface-alt, #f9f9f9); border-radius: 8px;">
        <h2 style="font-family: sans-serif;">{{ WELCOME_TITLE }}</h2>
        <p class="lead-text" style="font-size: 1.1rem; margin-bottom: 1.5rem;">
            {{ INTRO_ABOUT_ME }}
        </p>
        <div class="social-icons-wrapper" style="display: flex; justify-content: center; gap: 1rem;">
            {{ SOCIAL_ICONS }}
        </div>
    </div>

    <div class="nl-feed-header" style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid var(--theme-border, #ddd); padding-bottom: 0.5rem; margin-bottom: 1.5rem; font-family: sans-serif;">
        <h3 style="margin: 0; text-transform: uppercase;">The Archive</h3>
        <span class="post-count" style="font-size: 0.9em; color: #777;">Issues: {{ TOTAL_POSTS_COUNT }}</span>
    </div>

    <div class="post-feed">
        {{ POST_LIST }}
    </div>
</section>
