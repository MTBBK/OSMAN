<!DOCTYPE html>
<html lang="{{ SITE_LANGUAGE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ SITE_DESCRIPTION }}">
    <title>{{ SITE_TITLE }}</title>
    <link rel="icon" type="image/x-icon" href="{{ FAVICON_URL }}">
    <link rel="stylesheet" href="{{ THEME_NAME }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
	.code-block {position:relative; margin:1em 0;}
	.copy-btn {position:absolute; top:8px; right:8px; background:#333; color:#fff; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px; z-index:10; font-family:sans-serif;}
	pre {background:#1e1e1e; color:#d4d4d4; padding:15px; border-radius:8px; overflow-x:auto;}
	blockquote {border-left:4px solid #b58900; padding-left:15px; color:#93a1a1; margin-left:0;}
	.post-table {overflow-x:auto;}
	table {width:100%; border-collapse:collapse; margin-bottom:1rem;}
	th {border:1px solid #93a1a1; padding:8px; text-align:left;}
	td {border:1px solid #93a1a1; padding:8px;}
	.task-list {list-style-type:none; padding-left:0;}
	li {display:flex; align-items:center; gap:0.5rem;}
	onelinecode {background:rgba(120,120,120,0.2); padding:2px 4px; border-radius:4px;}
    .post-toc {background: rgba(0, 0, 0, 0.2);padding: 15px;border-radius: 8px;margin-bottom: 20px;}
    .post-toc .toc-title {margin-top: 0;margin-bottom: 10px;font-size: 1.25em;}
    .post-toc .toc-list {list-style-type: none;padding-left: 0;margin: 0;}
    .post-toc li {margin-bottom: 5px;display: block;}
    .post-toc li a {text-decoration: none;color: inherit;opacity: 0.8;}
    .post-toc li a:hover {opacity: 1;text-decoration: underline;}
    .post-toc .toc-level-2 { margin-left: 0; }
    .post-toc .toc-level-3 { margin-left: 15px; }
    .post-toc .toc-level-4 { margin-left: 30px; }
    .post-toc .toc-level-5 { margin-left: 45px; }
    </style>
</head>

<body>
    <header class="header container">
        <div class="site-branding">
            <a href="/" class="site-title">{{ SITE_TITLE }}</a>
        </div>
        <nav class="nav-bar">
        	<a href="./">Ana Sayfa</a>
            {{ NAV_BAR_LINKS }}
        </nav>
    </header>

    <main class="content container">
        {{ CONTENT }}
    </main>

    <footer class="footer container">
        <hr>
        <div class="footer-links">
            {{ SOCIAL_LINKS }}
        </div>
        <div class="footer-copy">
            <p>&copy; {{ COPYRIGHT_YEAR }} {{ AUTHOR_NAME }}</p>
            <p>&copy; <a href="https://osman.guru">OSMAN</a></p>
        </div>
    </footer>
</body>

</html>
